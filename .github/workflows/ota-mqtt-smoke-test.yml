name: PUSH FIRMWARE

on:
  workflow_dispatch:
    inputs:
      product_type:
        description: "Product type (determines feed folder)"
        required: true
        default: ""
        type: choice
        options:
          - BMS
          - BRIDGE
          - METER
      device_id:
        description: "Target device short ID"
        required: true
        default: ""
        type: string
      board:
        description: "Firmware binary to test"
        required: true
        default: ""
        type: choice
        options:
          - ESP32-S3-RS485-CAN
          - ATOM_S3_R
          - ATOM_S3
      package_version:
        description: "Firmware package version folder (use latest or vX.Y.Z)"
        required: true
        default: "latest"
        type: string
      firmware_url:
        description: "Optional direct firmware URL override"
        required: false
        type: string
      timeout_seconds:
        description: "Max seconds to wait for success ack"
        required: true
        default: "420"
        type: string

permissions:
  contents: read

jobs:
  ota-test:
    name: OTA test over MQTT
    runs-on: ubuntu-latest
    environment: QA
    concurrency:
      group: ota-smoke-${{ inputs.device_id }}
      cancel-in-progress: false
    env:
      MQTT_HOST: ${{ secrets.MQTT_HOST }}
      MQTT_PORT: ${{ secrets.MQTT_PORT }}
      MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
      MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
      DEVICE_ID: ${{ inputs.device_id }}
      BOARD: ${{ inputs.board }}
      PACKAGE_VERSION: ${{ inputs.package_version }}
      FIRMWARE_URL_INPUT: ${{ inputs.firmware_url }}
      TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
      FEED_REPOSITORY: opelpanfan/OPF-FIRMWARE-FEED
      FEED_BRANCH: main
      FEED_PRODUCT: ${{ inputs.product_type }}

    steps:
      - name: Validate required secrets and inputs
        run: |
          set -euo pipefail
          : "${MQTT_HOST:?Missing secret MQTT_HOST}"
          : "${DEVICE_ID:?Missing required input device_id}"
          if [[ -z "${MQTT_PORT:-}" ]]; then
            echo "MQTT_PORT not set; defaulting to 1883"
            echo "MQTT_PORT=1883" >> "$GITHUB_ENV"
          fi

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mosquitto-clients jq netcat-openbsd

      - name: Resolve and preflight firmware URL
        run: |
          set -euo pipefail

          firmware_url="${FIRMWARE_URL_INPUT}"
          if [[ -z "${firmware_url}" ]]; then
            firmware_url="https://raw.githubusercontent.com/${FEED_REPOSITORY}/${FEED_BRANCH}/${FEED_PRODUCT}/${PACKAGE_VERSION}/${BOARD}.bin"
          fi

          http_code=$(curl -L -s -o /dev/null -w "%{http_code}" "${firmware_url}")
          if [[ "${http_code}" != "200" ]]; then
            echo "Firmware URL preflight failed: HTTP ${http_code}"
            echo "URL: ${firmware_url}"
            exit 1
          fi

          echo "Using firmware URL: ${firmware_url}"
          echo "RESOLVED_FIRMWARE_URL=${firmware_url}" >> "$GITHUB_ENV"

      - name: Diagnose MQTT connectivity
        run: |
          set -euo pipefail

          echo "Testing DNS resolution for MQTT broker host"
          getent hosts "$MQTT_HOST"

          echo "Testing TCP connectivity to $MQTT_HOST:$MQTT_PORT"
          nc -vz -w 10 "$MQTT_HOST" "$MQTT_PORT"

      - name: Send OTA command and validate ack sequence
        run: |
          set -euo pipefail

          cmd_topic="rut/${DEVICE_ID}/cmd/update"
          ack_topic="rut/${DEVICE_ID}/cmd/update_ack"
          firmware_url="${RESOLVED_FIRMWARE_URL}"
          client_id="gha-ota-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          auth_args=( -V mqttv311 -i "$client_id" -h "$MQTT_HOST" -p "$MQTT_PORT" -d )
          if [[ -n "${MQTT_USERNAME:-}" ]]; then
            auth_args+=( -u "$MQTT_USERNAME" )
          fi
          if [[ -n "${MQTT_PASSWORD:-}" ]]; then
            auth_args+=( -P "$MQTT_PASSWORD" )
          fi

          payload=$(jq -cn --arg url "$firmware_url" '{url: $url}')
          echo "Client ID: ${client_id}"
          echo "Command topic: ${cmd_topic}"
          echo "Ack topic: ${ack_topic}"
          echo "Publishing OTA payload: ${payload}"

          ack_log="$(mktemp)"
          echo "Ack log file: ${ack_log}"

          cleanup() {
            if [[ -n "${sub_pid:-}" ]]; then
              kill "$sub_pid" 2>/dev/null || true
              wait "$sub_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          echo "Starting MQTT subscriber before publish"
          mosquitto_sub "${auth_args[@]}" -t "$ack_topic" -v >"$ack_log" 2>&1 &
          sub_pid=$!

          sleep 2

          if ! kill -0 "$sub_pid" 2>/dev/null; then
            echo "Subscriber exited early before publish"
            echo "Subscriber output:"
            cat "$ack_log" || true
            exit 1
          fi

          max_publish_attempts=5
          publish_attempt=1
          publish_succeeded=0

          while [[ $publish_attempt -le $max_publish_attempts ]]; do
            echo "MQTT publish attempt ${publish_attempt}/${max_publish_attempts}"

            if mosquitto_pub "${auth_args[@]}" -t "$cmd_topic" -m "$payload"; then
              echo "MQTT publish succeeded"
              publish_succeeded=1
              break
            fi

            if [[ $publish_attempt -lt $max_publish_attempts ]]; then
              sleep_seconds=$(( publish_attempt * 2 ))
              echo "MQTT publish failed; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi

            publish_attempt=$((publish_attempt + 1))
          done

          if [[ $publish_succeeded -ne 1 ]]; then
            echo "MQTT publish failed after ${max_publish_attempts} attempts"
            echo "Subscriber output:"
            cat "$ack_log" || true
            exit 1
          fi

          deadline=$(( $(date +%s) + TIMEOUT_SECONDS ))
          accepted_seen=0
          seen_lines=0

          while [[ $(date +%s) -lt $deadline ]]; do
            if ! kill -0 "$sub_pid" 2>/dev/null; then
              echo "Subscriber exited while waiting for ack"
              echo "Subscriber output:"
              cat "$ack_log" || true
              exit 1
            fi

            total_lines=$(wc -l < "$ack_log" || echo 0)

            if [[ "$total_lines" -gt "$seen_lines" ]]; then
              while [[ "$seen_lines" -lt "$total_lines" ]]; do
                seen_lines=$((seen_lines + 1))
                line=$(sed -n "${seen_lines}p" "$ack_log")
                echo "Ack raw: $line"

                msg="${line#${ack_topic} }"
                state=$(printf '%s' "$msg" | jq -r '.state // empty' 2>/dev/null || true)
                detail=$(printf '%s' "$msg" | jq -r '.detail // ""' 2>/dev/null || true)

                case "$state" in
                  accepted)
                    accepted_seen=1
                    ;;
                  success)
                    if [[ $accepted_seen -eq 1 ]]; then
                      echo "OTA smoke test passed: accepted -> success"
                      exit 0
                    fi
                    echo "Received success without observed accepted; treating as pass"
                    exit 0
                    ;;
                  failed|rejected)
                    echo "OTA smoke test failed with state=${state}, detail=${detail}"
                    exit 1
                    ;;
                  busy)
                    echo "OTA smoke test failed: device busy (${detail})"
                    exit 1
                    ;;
                  *)
                    echo "Ignoring non-terminal state '${state}'"
                    ;;
                esac
              done
            fi

            sleep 2
          done

          echo "OTA smoke test timed out after ${TIMEOUT_SECONDS}s waiting for success"
          echo "Captured subscriber output:"
          cat "$ack_log" || true
          exit 1
